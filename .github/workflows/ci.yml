name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: lint / check / test / package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Pants 2.32 runs on CPython 3.14 (the `pants-plugins` resolve targets 3.14). The integration
      # tests also create 3.11 and 3.12 partitions (multi-interpreter baseline merge), so install
      # all three so Pants can find an interpreter for each.
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.11
            3.12
            3.14

      - uses: pantsbuild/actions/init-pants@v11
        with:
          # Bump to invalidate all caches.
          gha-cache-key: v0
          named-caches-hash: ${{ hashFiles('build-support/lockfiles/*.lock') }}

      - name: Lint
        run: "pants lint ::"

      - name: Check (run Pyrefly on the example project)
        run: "pants check ::"

      - name: Test
        run: "pants test ::"

      - name: Check Pyrefly version pins are current
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: "python3 build-support/bin/generate_known_versions.py --check"

      - name: Package (build the wheel + sdist)
        run: "pants package pants-plugins/pants_pyrefly:dist"

  # Prove the version-conditional rules-API shim on every supported Pants line by consuming the
  # plugin from source (via pythonpath) and running `check` on a good + a bad file. Lightweight:
  # no per-version dev lockfiles needed. The full lint/check/test/package suite runs on 2.32 above.
  smoke:
    name: smoke (Pants ${{ matrix.pants-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pants-version: ["2.27.0", "2.31.0", "2.32.0"]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.11
            3.12
            3.14

      - uses: pantsbuild/actions/init-pants@v11
        with:
          gha-cache-key: smoke-${{ matrix.pants-version }}-v0
          named-caches-hash: ${{ hashFiles('build-support/lockfiles/*.lock') }}

      - name: Consumption smoke test (plugin loads + runs via pythonpath)
        env:
          PANTS_VERSION: ${{ matrix.pants-version }}
        run: bash build-support/ci/smoke_test.sh
